spring.application.name=ecommerce-api

# H2 Database
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=ecommerce-super-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Encryption
app.encryption.secret=1234567890123456
app.encryption.algorithm=AES

# Server
server.port=8080

# Logging
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG
